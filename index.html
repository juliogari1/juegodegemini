<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Granja de Colores Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Comic Neue', cursive;
            background-color: #e0f2fe;
            touch-action: manipulation;
            overflow-x: hidden;
            margin: 0;
        }
        .farm-bg {
            background: linear-gradient(to bottom, #87CEEB 0%, #87CEEB 40%, #7cfc00 40%, #7cfc00 100%);
            min-height: 100vh;
            position: relative;
            padding-bottom: 60px; /* Espacio para el crédito inferior */
        }
        .animal {
            cursor: pointer;
            transition: transform 0.2s;
            filter: drop-shadow(0 8px 10px rgba(0,0,0,0.3));
            user-select: none;
        }
        .barn {
            transition: transform 0.2s, filter 0.2s;
        }
        .barn:hover {
            transform: scale(1.05);
        }
        .cloud {
            position: absolute;
            background: white;
            border-radius: 50px;
            opacity: 0.8;
            animation: moveClouds 25s linear infinite;
            z-index: 0;
        }
        @keyframes moveClouds {
            from { left: -200px; }
            to { left: 100vw; }
        }
        .bounce-in {
            animation: bounceIn 0.5s cubic-bezier(0.36, 0, 0.66, -0.56) alternate;
        }
        @keyframes bounceIn {
            from { transform: scale(0); }
            to { transform: scale(1); }
        }
        /* Estilo para los créditos */
        .footer-credits {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(5px);
            text-align: center;
            padding: 8px 0;
            font-weight: bold;
            color: #1e40af;
            border-top: 2px solid #ffffff;
            z-index: 40;
            font-size: 0.9rem;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

<div class="farm-bg flex flex-col items-center p-2 md:p-4">
    <!-- Nubes -->
    <div class="cloud w-24 h-8 top-10" style="animation-delay: 0s;"></div>
    <div class="cloud w-40 h-12 top-32" style="animation-delay: -7s;"></div>
    <div class="cloud w-28 h-9 top-16" style="animation-delay: -15s;"></div>

    <!-- Encabezado -->
    <div class="z-10 text-center mb-2 md:mb-6">
        <h1 class="text-3xl md:text-5xl font-bold text-white drop-shadow-md mb-1">¡Súper Granja!</h1>
        <p id="instruction" class="text-lg md:text-2xl bg-white/90 rounded-full px-6 py-1 text-blue-800 font-bold shadow-lg inline-block">
            Cargando...
        </p>
    </div>

    <!-- Área Principal -->
    <div class="w-full max-w-6xl flex flex-col lg:flex-row items-center justify-center gap-4 md:gap-8 z-10 px-2">
        
        <!-- Casitas (Barns) -->
        <div id="barns-container" class="grid grid-cols-4 lg:grid-cols-2 gap-2 md:gap-4 order-2 lg:order-1 w-full lg:w-auto">
            <!-- Dinámico -->
        </div>

        <!-- Animal Central -->
        <div class="flex flex-col items-center order-1 lg:order-2 my-4 lg:my-0">
            <div id="animal-display" class="w-40 h-40 md:w-60 md:h-60 flex items-center justify-center bg-white/40 rounded-full border-4 border-dashed border-white shadow-inner">
                <!-- Animal -->
            </div>
            <div id="animal-label" class="mt-2 text-2xl md:text-3xl font-bold text-white bg-black/30 px-6 py-1 rounded-full border-2 border-white backdrop-blur-sm">
                ?
            </div>
        </div>

    </div>

    <!-- Éxito -->
    <div id="success-overlay" class="fixed inset-0 bg-green-500/90 hidden z-50 flex items-center justify-center flex-col text-white text-center p-4">
        <div class="text-9xl animate-bounce">🎈</div>
        <h2 id="success-msg" class="text-5xl md:text-7xl font-bold mb-4">¡GENIAL!</h2>
        <p class="text-2xl md:text-3xl">¡Lo hiciste muy bien!</p>
    </div>

    <!-- Créditos siempre presentes -->
    <div class="footer-credits">
        Juego Creado por: JULIO GARIBAY
    </div>
</div>

<script>
    const COLORS = [
        { id: 'red', hex: '#ef4444', name: 'Rojo' },
        { id: 'blue', hex: '#3b82f6', name: 'Azul' },
        { id: 'green', hex: '#22c55e', name: 'Verde' },
        { id: 'yellow', hex: '#facc15', name: 'Amarillo' },
        { id: 'orange', hex: '#f97316', name: 'Naranja' },
        { id: 'purple', hex: '#a855f7', name: 'Morado' },
        { id: 'pink', hex: '#f472b6', name: 'Rosa' },
        { id: 'brown', hex: '#92400e', name: 'Marrón' }
    ];

    const ANIMALS = [
        { type: 'Vaca', emoji: '🐮', sound: '¡Muuuu!' },
        { type: 'Cerdo', emoji: '🐷', sound: '¡Oinc!' },
        { type: 'Oveja', emoji: '🐑', sound: '¡Beee!' },
        { type: 'Pato', emoji: '🦆', sound: '¡Cuac!' },
        { type: 'Pollito', emoji: '🐥', sound: '¡Pío!' },
        { type: 'Caballo', emoji: '🐴', sound: '¡Iiiih!' },
        { type: 'Conejo', emoji: '🐰', sound: '¡Saltos!' },
        { type: 'Gallo', emoji: '🐓', sound: '¡Kikirikí!' },
        { type: 'Cabra', emoji: '🐐', sound: '¡Meeé!' },
        { type: 'Perro', emoji: '🐶', sound: '¡Guau!' }
    ];

    let currentAnimal = null;
    let currentColor = null;

    const barnsContainer = document.getElementById('barns-container');
    const animalDisplay = document.getElementById('animal-display');
    const animalLabel = document.getElementById('animal-label');
    const instruction = document.getElementById('instruction');
    const successOverlay = document.getElementById('success-overlay');
    const successMsg = document.getElementById('success-msg');

    function initGame() {
        barnsContainer.innerHTML = '';
        COLORS.forEach(color => {
            const barn = document.createElement('div');
            barn.className = `barn cursor-pointer flex flex-col items-center group`;
            barn.innerHTML = `
                <div class="w-16 h-16 sm:w-24 sm:h-24 md:w-32 md:h-32 rounded-t-xl border-2 md:border-4 border-b-0 border-white shadow-lg flex items-center justify-center text-2xl md:text-5xl" 
                     style="background-color: ${color.hex}">
                    🏠
                </div>
                <div class="w-full py-1 bg-white/90 rounded-b-lg text-blue-900 text-center font-bold text-xs md:text-base border-x-2 md:border-x-4 border-b-2 md:border-b-4 border-white truncate px-1">
                    ${color.name}
                </div>
            `;
            barn.onclick = () => checkMatch(color.id);
            barnsContainer.appendChild(barn);
        });

        nextTurn();
    }

    function nextTurn() {
        const randomAnimal = ANIMALS[Math.floor(Math.random() * ANIMALS.length)];
        const randomColor = COLORS[Math.floor(Math.random() * COLORS.length)];
        
        currentAnimal = randomAnimal;
        currentColor = randomColor;

        animalDisplay.classList.remove('bounce-in');
        void animalDisplay.offsetWidth; 
        animalDisplay.classList.add('bounce-in');

        animalDisplay.innerHTML = `
            <div class="animal text-7xl md:text-9xl" 
                 style="color: ${randomColor.hex}; filter: drop-shadow(0 0 5px white);">
                ${randomAnimal.emoji}
            </div>
        `;
        
        animalLabel.textContent = `${randomAnimal.type} ${randomColor.name}`;
        instruction.textContent = `¿Cuál es la casita del ${randomAnimal.type} ${randomColor.name}?`;
        instruction.style.borderBottom = `4px solid ${randomColor.hex}`;
    }

    function checkMatch(selectedColorId) {
        if (selectedColorId === currentColor.id) {
            handleSuccess();
        } else {
            handleError();
        }
    }

    function handleSuccess() {
        successMsg.textContent = currentAnimal.sound;
        successOverlay.classList.remove('hidden');
        instruction.textContent = "¡SÍ! " + currentAnimal.sound;
        
        setTimeout(() => {
            successOverlay.classList.add('hidden');
            nextTurn();
        }, 1200);
    }

    function handleError() {
        instruction.textContent = "¡Intenta de nuevo! 🎨";
        instruction.classList.add('bg-red-100');
        setTimeout(() => {
            instruction.classList.remove('bg-red-100');
            instruction.textContent = `¿Dónde vive el ${currentAnimal.type} ${currentColor.name}?`;
        }, 800);
    }

    window.onload = initGame;
</script>

</body>
</html>
